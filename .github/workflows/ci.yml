name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Lexer snapshot tests
        run: make test

      - name: Parser tests (ok + err)
        run: make parse-test
